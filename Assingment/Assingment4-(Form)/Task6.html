<!DOCTYPE html>
<html>
<head>
    <title>Dance Club Form</title>
</head>
<body>

<h3>Registration Form : Dance Club</h3>

<form>

    <table border="1" cellspacing="0" cellpadding="5">
        <tr>
            <td>Name:</td>
            <td><input type="text" size="40"></td>
        </tr>
        <tr>
            <td>Ic No:</td>
            <td>
                <input type="text" size="5">
                <input type="text" size="5">
                <input type="text" size="5">
            </td>
        </tr>
        <tr>
            <td>Address:</td>
            <td>
                <textarea rows="4" cols="40"></textarea>
            </td>
        </tr>
        <tr>
            <td>Gender:</td>
            <td>
                <input type="radio">Male
                <input type="radio">Female

            </td>
        </tr>
        <tr>
            <td>Dance Type:</td>
            <td>
                <input type="checkbox">Zapin
                <input type="checkbox">Joget
                <input type="checkbox">Inang
                <input type="checkbox">Lion Dance

            </td>
        </tr>
        <tr>
            <td>Competiton:</td>
            <td>
                <select size="3">
                    <option>State Level</option>
                    <option>National Level</option>
                    <option>StateInternation Level</option>

                </select>
            </td>
        </tr>
        <tr>
            <td>Nationalty:</td>
            <td>
                <select>
                    <option>Please Select</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>Password:</td>
            <td><input type="password"></td>
        </tr>
        <br>
    
    </table>
    <input type="submit" value="Register Me">
    <input type="reset" value="Cancel">

</form>
<br><br><br>
    <a href="subIndex.html">back to subIndex</a>
</body>
</html>
