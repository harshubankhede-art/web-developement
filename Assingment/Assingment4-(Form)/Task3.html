<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <h2>Registration Form</h2>

<form>
    <label>First Name:</label>
    <input type="text" placeholder="enter first name"><br>

    <label>Last Name:</label>
    <input type="text" placeholder="Enter Last Name"><br>

    <label>Email:</label>
    <input type="text" placeholder="Enter Email address"><br>

    <label>Password:</label>
    <input type="password"><br>

    <label>Gender:</label>
    <input type="radio" name="gender"> Male
     <input type="radio" name="gender"> Female
     <input type="radio" name="gender"> Other
     <br>

     <label>Age:</label>
     <input type="number">
     <br>

     <label>Preferences:</label>
     <input type="checkbox"> Acrylic Painting
     <input type="checkbox"> Oil Painting
     <input type="checkbox"> Water Painting
     <br>

     <label>Occupation:</label>
     <select>
        <option>Student</option>
        <option>Teacher</option>
     </select>
     <br>

     <label>Bio:</label>
     <br>
     <textarea rows="4" cols="30" placeholder="Share few line about yourself..."></textarea>
     <br><br>
     <input type="reset" value="RESET">
     <input type="submit" value="submit">
</form>
<br><br><br>

</body>
</html>
