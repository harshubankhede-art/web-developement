<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <h1>Application Form</h1>
    <form>
        <label>First Name:</label>
        <input type="text" name="First Name">
        <label>Last Name:</label>
        <input type="text" name="Last Name"><br><br>
        <label>Date of Birth</label>
        <input type="text" name="date of Birth">
        <label>Age:</label>
        <input type="text" name="Age"><br><br>
        <label>Gender:</label>
        <select>
              <option>Male</option>
        </select>
        <label>Email Address:</label>
        <input type="text" name="Email Address" placeholder="Enter email address"><br><br>
        <label>Position Available:</label>
        <input type="radio">Junior Developer
        <input type="radio">Mid-level Developer
        <input type="radio">Senior Developer
        <br><br>
        <label>Programming Language:</label>
        <input type="checkbox">Java
         <input type="checkbox">JavaScript
          <input type="checkbox">Python
          <br><br>
          <label>Password</label>
          <input type="text" name="password">
          <label>Confirm Password:</label>
          <input type="text" name="Confirm password">
            <br><br>
          <input type="submit" value="submit">
          <input type="Reset" value="Reset">
    </form>
